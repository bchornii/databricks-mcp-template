name: Architecture Review (Agent Guided)

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  unit-tests:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --all-extras --group dev

      - name: Run unit tests
        run: uv run pytest tests/unit -v

  prepare-review-context:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    needs: unit-tests
    outputs:
      changed_files: ${{ steps.changed.outputs.changed_files }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Collect changed files
        id: changed
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100
            })

            const names = files.map(f => f.filename)
            core.setOutput('changed_files', JSON.stringify(names))

      - name: Build review context artifact
        run: |
          mkdir -p review-context
          echo '${{ steps.changed.outputs.changed_files }}' > review-context/changed-files.json
          cp .github/review-guides/architecture-review.md review-context/architecture-review.md

      - name: Upload review context artifact
        uses: actions/upload-artifact@v4
        with:
          name: architecture-review-context
          path: review-context

  enforce-architecture-rules:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    needs: prepare-review-context
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enforce high-severity architecture rules
        uses: actions/github-script@v7
        env:
          CHANGED_FILES_JSON: ${{ needs.prepare-review-context.outputs.changed_files }}
        with:
          script: |
            const fs = require('fs')

            let changedFiles = []
            try {
              const parsed = JSON.parse(process.env.CHANGED_FILES_JSON || '[]')
              changedFiles = Array.isArray(parsed) ? parsed : []
            } catch {
              changedFiles = []
            }

            const violations = []

            for (const file of changedFiles) {
              if (!file.endsWith('.py')) continue
              if (!fs.existsSync(file)) continue

              const content = fs.readFileSync(file, 'utf8')

              if (file.startsWith('server/infrastructure/')) {
                const importsAuth =
                  /from\s+server\.auth\s+import\s+/.test(content) ||
                  /import\s+server\.auth\b/.test(content) ||
                  /from\s+server\s+import\s+auth\b/.test(content)

                if (importsAuth) {
                  violations.push(
                    `${file}: High - infrastructure layer imports auth helpers (violates DI/auth boundary)`
                  )
                }
              }

              if (file.startsWith('server/tools/')) {
                const explicitViolationMarker =
                  /Intentional architecture violation for PR-review testing/.test(content)

                if (explicitViolationMarker) {
                  violations.push(
                    `${file}: High - tool adapter contains orchestration/business logic marker (violates thin adapter rule)`
                  )
                }
              }
            }

            if (violations.length > 0) {
              core.setFailed(
                `Architecture rule violations detected:\n- ${violations.join('\n- ')}`
              )
            } else {
              core.info('No high-severity architecture rule violations detected.')
            }

  # Optional integration point:
  # Add a third job that invokes your preferred review agent/LLM tool.
  # Feed it:
  #   1) .github/review-guides/architecture-review.md
  #   2) pull request diff or changed files from prepare-review-context
  # Then publish findings as PR comments/check summaries.
